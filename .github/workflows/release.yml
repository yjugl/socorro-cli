name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
            use_cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive_ext: tar.gz
            use_cross: true
            cargo_flags: "--no-default-features"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
            use_cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive_ext: tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_ext: tar.gz
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../socorro-cli-${{ matrix.target }}.tar.gz socorro-cli
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/socorro-cli.exe -DestinationPath socorro-cli-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: socorro-cli-${{ matrix.target }}
          path: socorro-cli-${{ matrix.target }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo 'body<<EOF' >> "$GITHUB_OUTPUT"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            socorro-cli-*.tar.gz
            socorro-cli-*.zip
          body: ${{ steps.changelog.outputs.body }}
